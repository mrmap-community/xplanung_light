name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    # Wechsel auf das aktuellere Ubuntu-Image passend zum Node24-Runner
    runs-on: ubuntu-24.04
    steps:
    # Nutzt die aktuellste Unterversion, um Node 24 nativ anzusprechen
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin python3-mapscript

    - name: Install Python Deps
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install -r requirements.txt mapscript==8.0.0

    - name: Link Mapscript C-Lib (Fix für CI)
      run: |
        source .venv/bin/activate
        # Findet die .so Datei dynamisch im Ubuntu-Dateisystem
        SO_FILE=$(find /usr/lib/python3/dist-packages/mapscript -name "_mapscript*.so" | head -n 1)
        # Pfad angepasst an Python 3.12
        TARGET_DIR=.venv/lib/python3.12/site-packages/mapscript/
        mkdir -p $TARGET_DIR
        cp $SO_FILE $TARGET_DIR/_mapscript.so

    - name: SpatiaLite initialisieren & Tests ausführen
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test