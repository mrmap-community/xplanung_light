name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System & MapServer Deps
      run: |
        sudo apt-get update
        # python3-mapscript liefert die perfekt kompilierte, native Erweiterung für Python 3.12
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite python3-mapscript

    - name: Install Python Deps
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip setuptools wheel
        
        # 1. Entfernt mapscript aus den requirements, damit pip nichts zerstört
        sed -i '/mapscript/d' requirements.txt
        pip install -r requirements.txt
        
        # 2. DEINE METHODE: Wir kopieren das saubere, systemweite Mapscript direkt ins venv
        # Unter Ubuntu 24.04 liegen die Python 3.12 Systempakete in dist-packages
        mkdir -p .venv/lib/python3.12/site-packages/mapscript
        
        # Kopiert die Python-Dateien
        cp -r /usr/lib/python3/dist-packages/mapscript/* .venv/lib/python3.12/site-packages/mapscript/
        
        # Kopiert die kritische .so Datei an die richtige Stelle (dein Fix!)
        SO_FILE=$(find /usr/lib/python3/dist-packages/mapscript -name "_mapscript*.so" | head -n 1)
        cp $SO_FILE .venv/lib/python3.12/site-packages/mapscript/_mapscript.so

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test

