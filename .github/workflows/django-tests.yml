name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System Deps
      run: |
        sudo apt-get update
        # Installiert Mapserver + das korrekte, passende Python-Mapscript-Paket
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite python3-mapscript

    - name: Install Python Deps
      run: |
        # WICHTIG: --system-site-packages erlaubt dem venv, das funktionierende System-Mapscript zu nutzen!
        python -m venv --system-site-packages .venv
        source .venv/bin/activate
        pip install --upgrade pip
        # Installiert alle Django-Pakete, ignoriert aber das kaputte mapscript aus den requirements
        pip install -r requirements.txt --ignore-installed mapscript || true

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test

