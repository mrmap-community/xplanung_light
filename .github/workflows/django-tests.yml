name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite python3-mapscript

    - name: Install Python Deps
      run: |
        python -m venv --system-site-packages .venv
        source .venv/bin/activate
        pip install --upgrade pip
        
        # WICHTIG: Entfernt die mapscript-Zeile komplett aus den Requirements,
        # damit pip nicht versucht, das kaputte Paket über das System-Paket drüberzuinstallieren!
        sed -i '/mapscript/d' requirements.txt
        
        pip install -r requirements.txt

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test

