name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System & MapServer Development Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite libmapserver-dev

    - name: Install Python Deps
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install mapscript==8.0.0
        
        # FIX: Das Pip-Paket baut die _mapscript.so fälschlicherweise im Hauptverzeichnis des venv-site-packages.
        # Wir verschieben sie manuell in den mapscript-Unterordner, damit der Import klappt!
        cd .venv/lib/python3.12/site-packages
        if [ -f _mapscript*.so ]; then
            mv _mapscript*.so mapscript/
        fi

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test
