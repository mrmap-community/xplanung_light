name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System Deps
      run: |
        sudo apt-get update
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite python3-mapscript

    - name: Install Python Deps
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip
        
        # FIX: Erst alle anderen Abhängigkeiten installieren, mapscript ignorieren...
        pip install -r requirements.txt --ignore-installed mapscript || true
        # ...und danach explizit die korrekte Version 8.0.0 erzwingen
        pip install mapscript==8.0.0

    - name: Link Mapscript C-Lib (Fix für CI)
      run: |
        source .venv/bin/activate
        SO_FILE=$(find /usr/lib/python3/dist-packages/mapscript -name "_mapscript*.so" | head -n 1)
        TARGET_DIR=.venv/lib/python3.12/site-packages/mapscript/
        mkdir -p $TARGET_DIR
        cp $SO_FILE $TARGET_DIR/_mapscript.so

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        # Teilt GeoDjango den exakten Bibliotheksnamen unter Ubuntu mit
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test
