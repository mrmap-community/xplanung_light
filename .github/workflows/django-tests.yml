name: Django CI (XPlanung Light)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.12'

    - name: Install System & MapServer Development Deps
      run: |
        sudo apt-get update
        # libmapserver-dev liefert die Header-Dateien, damit pip das mapscript-Modul fehlerfrei kompilieren kann!
        sudo apt-get install -y binutils libproj-dev gdal-bin spatialite-bin libsqlite3-mod-spatialite libmapserver-dev

    - name: Install Python Deps
      run: |
        # Ganz normales, sauberes venv ohne System-Verknüpfungen
        python -m venv .venv
        source .venv/bin/activate
        pip install --upgrade pip setuptools wheel
        
        # Installiert erst deine Standard-Pakete
        pip install -r requirements.txt
        
        # Erzwingt die Installation von mapscript 8.0.0. 
        # Da libmapserver-dev installiert ist, baut pip hieraus jetzt eine perfekt passende _mapscript.so!
        pip install mapscript==8.0.0

    - name: SpatiaLite initialisieren & Tests ausführen
      env:
        SPATIALITE_LIBRARY_PATH: 'mod_spatialite.so'
      run: |
        source .venv/bin/activate
        python manage.py shell -c "import django; django.db.connection.cursor().execute('SELECT InitSpatialMetaData(1);')"
        python manage.py test

