{% extends "../xplanung_light/layout.html" %}
{% load django_bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}
{% block content %}
<script type="text/javascript">
  
  document.addEventListener('DOMContentLoaded', function () {
    injectCaptchaRefreshButton();
});

function injectCaptchaRefreshButton() {
    // django-formset rendert das Captcha-Bild mit class="captcha"
    const captchaImg = document.querySelector('img.captcha');
    if (!captchaImg) return;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = '↻';
    btn.className = 'btn btn-sm btn-outline-secondary ms-2';

    btn.addEventListener('click', function () {
        fetch('/captcha/refresh/', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(res => res.json())
        .then(data => {
            // Key-Feld aktualisieren
            document.querySelector('input[name$="_0"]').value = data.key;
            // Bild tauschen
            captchaImg.src = data.image_url;
            // Antwort leeren
            const answer = document.querySelector('input[name$="_1"]');
            if (answer) answer.value = '';
        });
    });

    // Button nach dem Bild einfügen
    captchaImg.insertAdjacentElement('afterend', btn);
}
</script>
<h2>Registrieren</h2>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        {% bootstrap_button button_type="submit" content="Registrieren" %}
    </form>
{% endblock %}
